    <title>辯論版百萬富翁</title>
    <style>
        body {
            background-color: #0b0c10;

            padding: 20px;
            box-sizing: border-box;
        }
        #game-container {

            max-width: 800px;
            background: radial-gradient(circle, #1f2833 0%, #0b0c10 100%);
            border: 2px solid #66fcf1;

            padding: 30px;
            box-shadow: 0 0 20px rgba(102, 252, 241, 0.3);
            text-align: center;
        }
        h1 {
            color: #66fcf1;
            text-shadow: 0 0 10px rgba(102, 252, 241, 0.5);
            margin-top: 0;
        }
        #level-info {

            color: #45a29e;
            margin-bottom: 20px;
            font-weight: bold;
        }
        #question-box {
            background-color: rgba(0, 0, 0, 0.5);
            border: 2px solid #45a29e;
            border-radius: 10px;
            padding: 20px;
            font-size: 1.3em;
            margin-bottom: 30px;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1.5;
        }
        #options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
